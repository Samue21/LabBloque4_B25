databaseChangeLog:
  - changeSet:
      id: 2
      author: sam
      changes:
        - createTable:
            tableName: dinosaur
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: specie
                  type: varchar(255)
              - column:
                  name: status
                  type: varchar(255)
              - column:
                  name: feeding_cost_per_day
                  type: numeric(10,2)
              - column:
                  name: dino_type
                  type: varchar(31)
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: dinosaur