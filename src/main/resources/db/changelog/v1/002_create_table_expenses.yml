databaseChangeLog:
  - changeSet:
      id: 2
      author: sam
      changes:
        - createTable:
            tableName: expenses
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
              - column:
                  name: amount
                  type: DOUBLE
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: timestamp
                  type: TIMESTAMP